name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write # push tags + create the GitHub release
  pull-requests: write # changesets opens the "Version Packages" PR
  id-token: write # OIDC token for npm trusted publishing

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          # Full history + tags to detect prior releases, and persist the
          # PAT so the publish step can push tags without re-auth.
          fetch-depth: 0

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Update npm for OIDC trusted publishing
        run: npm install --global npm@latest

      - name: Version
        id: changesets
        uses: changesets/action@v1
        with:
          version: yarn changeset version
          title: "chore(release): version packages"
          commit: "chore(release): version packages"

      # Runs on the push that merges the version PR. The npm and tag checks
      # are independent so the step is a safe no-op on every other push.
      - name: Publish
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          PKG="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"

          # Publish to npm via OIDC (no token)
          npm view "${PKG}@${VERSION}" version >/dev/null 2>&1 \
              || npm publish --access public --provenance

          # Tag the release, unless this version is already tagged.
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
              echo "${TAG} already tagged."
          else
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git tag "${TAG}"
              git push origin "${TAG}"
              gh release create "${TAG}" --title "${TAG}" --generate-notes
          fi
